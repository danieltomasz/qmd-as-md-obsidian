name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build
        run: |
          npm install
          npm run build

      - name: Select manifest for this tag
        # A tag containing a hyphen (e.g. 0.2.0-rc.8) is a prerelease: ship
        # manifest-beta.json as manifest.json so BRAT's beta channel reads
        # the right version. A plain tag (e.g. 0.2.0) ships manifest.json.
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-* ]]; then
            echo "Prerelease tag $TAG — using manifest-beta.json"
            cp manifest-beta.json manifest.json
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "Stable tag $TAG — using manifest.json"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.PRERELEASE }}
          files: |
            main.js
            manifest.json
            styles.css
