name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build
        run: |
          npm install
          npm run build

      - name: Select manifest for this tag
        # A tag containing a hyphen (e.g. 0.2.0-rc.8) is a prerelease: ship
        # manifest-beta.json as manifest.json so BRAT's beta channel reads
        # the right version. A plain tag (e.g. 0.2.0) ships manifest.json.
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-* ]]; then
            echo "Prerelease tag $TAG — using manifest-beta.json"
            if [ ! -f manifest-beta.json ]; then
              echo "::error::Prerelease tag $TAG but manifest-beta.json is missing."
              exit 1
            fi
            node -e "JSON.parse(require('fs').readFileSync('manifest-beta.json','utf8'))" \
              || { echo "::error::manifest-beta.json is not valid JSON."; exit 1; }
            cp manifest-beta.json manifest.json
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "Stable tag $TAG — using manifest.json"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.PRERELEASE }}
          files: |
            main.js
            manifest.json
            styles.css
